[app]
seed_file = "universities_seed.json"
data_dir = ""
config_dir = ""
cache_dir = ""
runs_dir = "runs"

[database]
path = "profsearch.db"
sqlite_vec_extension = ""
echo = false

[http]
timeout_seconds = 20
request_delay_seconds = 0.35
concurrent_requests = 4
user_agent = "ProfSearch/0.1 (+https://openalex.org)"

[openalex]
base_url = "https://api.openalex.org"
email = ""
api_key = ""
api_keys = []
per_page = 10
max_candidates = 5

[matching]
threshold = 0.82
ambiguity_margin = 0.05

[publications]
start_year = 2021
per_page = 50
max_pages_per_author = 5

[embeddings]
backend = "sentence_transformers"
model_name = "allenai/specter2_base"
dimension = 768
batch_size = 16

[search]
# result_limit is unset — return all results
work_limit = 5
candidate_pool = 250

[funding]
nih_base_url = "https://api.reporter.nih.gov/v2"
nsf_base_url = "https://api.nsf.gov/services/v1"
per_page = 50
max_pages = 5
